<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>맥세스컨설팅 교육팀 | 주간 업무 플래너</title>

  <!-- React + Babel (CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <!-- Firebase (CDN) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #EEF2F7; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', Arial, sans-serif; }
    #root { min-height: 100vh; }
    .spin { animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- ──────────────────────────────────────────
       ★ Firebase 설정 (본인 값으로 교체 필요)
       Firebase Console → 프로젝트 설정 → 내 앱 → SDK 설정에서 복사
  ────────────────────────────────────────── -->
  <script>
const firebaseConfig = {
  apiKey:            "AIzaSyDJNfdsHZR1fZF-3de7l7G27oqZD4cgF50",
  authDomain:        "maxcess-planner.firebaseapp.com",
  databaseURL:       "https://maxcess-planner-default-rtdb.firebaseio.com",
  projectId:         "maxcess-planner",
  storageBucket:     "maxcess-planner.firebasestorage.app",
  messagingSenderId: "507173456823",
  appId:             "1:507173456823:web:e2bdd196957fcfc9ed3632"
};
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── 상수 ── */
    const MEMBERS = ["김수지", "팀원"];
    const DAYS = ["월", "화", "수", "목", "금", "토"];
    const MC = {
      "김수지": { bg:"#EBF5FF", border:"#2196F3", text:"#1565C0", badge:"#2196F3" },
      "팀원":   { bg:"#FCE4EC", border:"#E91E63", text:"#880E4F", badge:"#E91E63" },
    };
    const PAL = ["#4A90D9","#E67E22","#27AE60","#9B59B6","#E74C3C","#16A085","#F39C12","#2980B9","#8E44AD","#C0392B"];

    const MAXCESS_CONTEXT = `[맥세스컨설팅 교육팀 업무 컨텍스트]
회사: 맥세스컨설팅 (프랜차이즈 전문 컨설팅) / 팀: 교육팀 (팀장: 김수지)
주요 카테고리 및 반복 업무:
1. 전문가과정: 교안 수정/강의 진행/동영상 편집 유튜브 업로드/블로그 포스팅/출석체크/수업료 납부/수강생 안내 카톡
2. CEO과정: 교육생 등록/강의 진행/교안 수정/입학식 준비/기사 송출/연수 안내
3. MICC(매월 첫째주 화요일): 포스터·현수막 제작/교육비 체크/참가자 명단/강사 컨택/MC 대본/강의 진행
4. 진흥원/진흥인의 날: 회원 명단/회비 관리/행사 기획·준비/공문 작성/완료보고서
5. 총동문회: 회비 관리/신규가입자 등록/경조사 안내
6. 외부행사: 참가자 안내/체크리스트/대본/PPT/물품 준비
7. SNS·콘텐츠: 카드뉴스/기사 작성·송출/블로그·유튜브·인스타 업로드
8. 외부교육: 커리큘럼 제작/강사 섭외/교육 자료 제작
9. 기업부설연구소: 인력 처리/연구보고서/벤처기업·메인비즈 갱신
10. 박람회: 현수막·배너·자료 준비/인원 배치
11. 인사·행정: 퇴직금 정리/법률원 확인/인턴십 서류·업무 분장
업무특성: 강의·행사는 주차 단위 반복, 두 담당자 균등 분장 중요`;

    /* ── 헬퍼 ── */
    let _id = Date.now();
    const uid = () => String(++_id);
    const getWeekDates = (off = 0) => {
      const today = new Date();
      const mon = new Date(today);
      mon.setDate(today.getDate() - (today.getDay() === 0 ? 6 : today.getDay() - 1) + off * 7);
      return DAYS.map((_, i) => { const d = new Date(mon); d.setDate(mon.getDate() + i); return d; });
    };
    const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
    const fmtFull = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const todayStr = fmtFull(new Date());

    /* ── Firebase 훅 ── */
    function useFirebase() {
      const [data, setData] = useState({ categories: [], tasks: [], memberNames: [...MEMBERS] });
      const [connected, setConnected] = useState(false);
      const [syncing, setSyncing] = useState(false);
      const ref = useRef(db.ref("planner"));

      useEffect(() => {
        // 연결 상태 감지
        db.ref(".info/connected").on("value", snap => setConnected(!!snap.val()));

        // 실시간 데이터 수신
        ref.current.on("value", snap => {
          const val = snap.val();
          if (val) {
            setData({
              categories: val.categories ? Object.values(val.categories) : [],
              tasks: val.tasks ? Object.values(val.tasks) : [],
              memberNames: val.memberNames || [...MEMBERS],
            });
          }
        });
        return () => { ref.current.off(); db.ref(".info/connected").off(); };
      }, []);

      const update = useCallback(async (path, value) => {
        setSyncing(true);
        try { await db.ref(`planner/${path}`).set(value); }
        finally { setTimeout(() => setSyncing(false), 500); }
      }, []);

      const updateAll = useCallback(async (newData) => {
        setSyncing(true);
        try {
          const payload = {
            memberNames: newData.memberNames,
            categories: newData.categories.reduce((acc, c) => { acc[c.id] = c; return acc; }, {}),
            tasks: newData.tasks.reduce((acc, t) => { acc[t.id] = t; return acc; }, {}),
          };
          await ref.current.set(payload);
        } finally { setTimeout(() => setSyncing(false), 500); }
      }, []);

      return { data, setData: updateAll, connected, syncing };
    }

    /* ── Excel 내보내기 ── */
    async function generateExcel(weekDates, categories, tasks, memberNames) {
      const weekKey = fmtFull(weekDates[0]);
      const weekLabel = `${fmt(weekDates[0])} ~ ${fmt(weekDates[5])}`;
      const catData = categories.filter(c => c.weekKey === weekKey);
      const taskData = tasks.filter(t => t.weekKey === weekKey);
      const css = `body{font-family:Arial,sans-serif;font-size:12px}table{border-collapse:collapse;width:100%}.t1{background:#1a1a2e;color:#fff;font-size:15px;font-weight:bold;padding:12px 16px}.t2{background:#16213e;color:#90CAF9;font-size:11px;padding:5px 16px}.sh{background:#0f3460;color:#fff;font-weight:bold;padding:8px 12px;font-size:12px}.ch{background:#37474F;color:#fff;font-weight:bold;padding:7px 10px;font-size:11px;text-align:center;border:1px solid #546E7A}.tr td{padding:6px 10px;border:1px solid #E0E0E0;font-size:11px}.alt{background:#F8F9FA}.done{color:#9E9E9E;text-decoration:line-through}.ok{background:#E8F5E9;color:#2E7D32;font-weight:bold;text-align:center}.no{background:#FFF8E1;color:#F57F17;font-weight:bold;text-align:center}.m0{background:#BBDEFB;color:#1565C0;font-weight:bold;text-align:center}.m1{background:#F8BBD0;color:#880E4F;font-weight:bold;text-align:center}.sp td{height:12px}.catbold{font-weight:bold;vertical-align:top;padding:8px 10px;border:1px solid #ddd}`;
      let h = `<html><head><meta charset="UTF-8"><style>${css}</style></head><body><table>`;
      h += `<tr><td colspan="6" class="t1">📋 맥세스컨설팅 교육팀 주간업무 보고서</td></tr><tr><td colspan="6" class="t2">📅 ${weekLabel} | 작성: ${memberNames[0]}</td></tr><tr class="sp"><td colspan="6"></td></tr>`;
      h += `<tr><td colspan="6" class="sh">▶ 카테고리별 업무 현황</td></tr><tr><td class="ch" style="width:15%">카테고리</td><td class="ch" style="width:28%">업무 내용</td><td class="ch" style="width:9%">담당자</td><td class="ch" style="width:11%">예정 요일</td><td class="ch" style="width:8%">완료</td><td class="ch" style="width:29%">비고</td></tr>`;
      catData.forEach((cat, ci) => {
        const cc = PAL[ci % PAL.length];
        const ct = taskData.filter(t => t.categoryId === cat.id);
        const done = ct.filter(t => t.done).length;
        if (!ct.length) { h += `<tr class="tr"><td colspan="6" style="border-left:4px solid ${cc};color:${cc};font-weight:bold">🏷 ${cat.name}</td></tr>`; return; }
        ct.forEach((t, ti) => {
          const mi = memberNames.indexOf(t.member); const mc = mi === 0 ? "m0" : "m1";
          const dl = t.dayIndex !== null ? `${DAYS[t.dayIndex]}요일(${fmt(weekDates[t.dayIndex])})` : "미배정";
          if (ti === 0) h += `<tr class="tr${ti%2?" alt":""}" style="border-left:4px solid ${cc}"><td rowspan="${ct.length}" class="catbold" style="background:${cc}22;color:${cc}">🏷 ${cat.name}<br><small style="color:#999;font-weight:normal">${done}/${ct.length} 완료</small></td>`;
          else h += `<tr class="tr${ti%2?" alt":""}" style="border-left:4px solid ${cc}">`;
          h += `<td class="${t.done?"done":""}">${t.text}</td><td class="${mc}">${t.member}</td><td style="text-align:center;color:#555;font-size:10px">${dl}</td><td class="${t.done?"ok":"no"}">${t.done?"✓ 완료":"진행중"}</td><td style="color:#90A4AE">${t.note||""}</td></tr>`;
        });
      });
      h += `<tr class="sp"><td colspan="6"></td></tr><tr><td colspan="6" class="sh">▶ 날짜별 업무 상세</td></tr><tr><td class="ch">날짜</td><td class="ch">카테고리</td><td class="ch">업무 내용</td><td class="ch">담당자</td><td class="ch">완료</td><td class="ch">완료율</td></tr>`;
      DAYS.forEach((day, di) => {
        const dt = taskData.filter(t => t.dayIndex === di); const dd = dt.filter(t => t.done).length; const pp = dt.length ? Math.round(dd/dt.length*100) : 0;
        if (!dt.length) { h += `<tr class="tr"><td style="font-weight:bold;background:#FAFAFA">${day}요일(${fmt(weekDates[di])})</td><td colspan="5" style="color:#CFD8DC;font-style:italic">업무 없음</td></tr>`; return; }
        dt.forEach((t, ti) => {
          const cat = catData.find(c => c.id === t.categoryId); const ci2 = cat ? catData.indexOf(cat) : -1; const cc = ci2 >= 0 ? PAL[ci2 % PAL.length] : "#9E9E9E"; const mi = memberNames.indexOf(t.member); const mc = mi === 0 ? "m0" : "m1";
          if (ti === 0) h += `<tr class="tr${ti%2?" alt":""}"><td rowspan="${dt.length}" style="font-weight:bold;background:#FAFAFA;vertical-align:top;border:1px solid #ddd">${day}요일<br><small style="color:#999">${fmt(weekDates[di])}</small></td>`;
          else h += `<tr class="tr${ti%2?" alt":""}">`;
          h += `<td style="color:${cc};font-weight:bold;font-size:10px">${cat?cat.name:"기타"}</td><td class="${t.done?"done":""}">${t.text}</td><td class="${mc}">${t.member}</td><td class="${t.done?"ok":"no"}">${t.done?"✓":"○"}</td>`;
          if (ti === 0) h += `<td rowspan="${dt.length}" style="text-align:center;vertical-align:middle;font-weight:bold;border:1px solid #ddd">${pp}%<br><small style="color:#90A4AE">${dd}/${dt.length}</small></td>`;
          h += `</tr>`;
        });
      });
      h += `<tr class="sp"><td colspan="6"></td></tr><tr><td colspan="6" class="sh">▶ 담당자별 완료율 요약</td></tr><tr><td class="ch" colspan="2">담당자</td><td class="ch">전체</td><td class="ch">완료</td><td class="ch">미완료</td><td class="ch">완료율</td></tr>`;
      memberNames.forEach((m, mi) => { const mt = taskData.filter(t => t.member === m); const md = mt.filter(t => t.done).length; const pp = mt.length ? Math.round(md/mt.length*100) : 0; const mc = mi === 0 ? "m0" : "m1"; h += `<tr class="tr"><td colspan="2" class="${mc}" style="padding:8px 10px;border:1px solid #ddd">👤 ${m}</td><td style="text-align:center;font-weight:bold;border:1px solid #E0E0E0">${mt.length}</td><td class="ok">${md}</td><td class="no">${mt.length-md}</td><td style="text-align:center;font-weight:bold;border:1px solid #E0E0E0">${mt.length?pp+"%":"-"}</td></tr>`; });
      h += `</table></body></html>`;
      const blob = new Blob([h], { type:"application/vnd.ms-excel;charset=utf-8;" });
      const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href=url; a.download=`맥세스교육팀_주간업무보고_${weekKey}.xls`; a.click(); URL.revokeObjectURL(url);
    }

    /* ── AI 생성 ── */
    async function aiGenerateTasks(theme, weekDates, memberNames) {
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1200,
          messages:[{ role:"user", content:`${MAXCESS_CONTEXT}\n\n맥세스컨설팅 교육팀 업무 계획 전문가로서, 아래 주제의 세부 업무를 JSON만 출력하세요.\n\n주제: "${theme}"\n이번 주: ${DAYS.map((d,i)=>`${d}(${fmt(weekDates[i])})`).join(", ")}\n팀원: ${memberNames.join(", ")}\n\n규칙: tasks 5~8개, 두 팀원 균등 배분, 논리적 순서(준비→실행→사후), member는 반드시 "${memberNames[0]}" 또는 "${memberNames[1]}"\n\n{"categoryName":"카테고리명","tasks":[{"text":"업무명","member":"${memberNames[0]}","dayIndex":0,"note":"설명"}]}` }]
        })
      });
      const data = await resp.json();
      return JSON.parse(data.content?.[0]?.text?.replace(/```json|```/g,"").trim()||"{}");
    }

    /* ── TaskRow ── */
    function TaskRow({ t, cats, memberNames, weekDates, onToggle, onDelete, onUpdate }) {
      const [editing, setEditing] = useState(false);
      const [editText, setEditText] = useState(t.text);
      const [showMenu, setShowMenu] = useState(false);
      const inputRef = useRef(null);
      const menuRef = useRef(null);
      const cat = cats.find(c => c.id === t.categoryId);
      const ci = cat ? cats.indexOf(cat) : -1;
      const catColor = ci >= 0 ? PAL[ci % PAL.length] : "#9E9E9E";
      const mi = memberNames.indexOf(t.member);
      const mc = mi === 0 ? MC["김수지"] : MC["팀원"];

      useEffect(() => { if (editing && inputRef.current) inputRef.current.focus(); }, [editing]);
      useEffect(() => {
        const h = e => { if (menuRef.current && !menuRef.current.contains(e.target)) setShowMenu(false); };
        document.addEventListener("mousedown", h);
        return () => document.removeEventListener("mousedown", h);
      }, []);

      const saveText = () => { if (editText.trim()) onUpdate(t.id, { ...t, text: editText.trim() }); setEditing(false); };

      return (
        <div style={{ display:"flex", gap:6, marginBottom:6, alignItems:"flex-start", padding:"7px 8px", borderRadius:8, background:t.done?"#F9F9F9":"#fff", border:"1px solid #F0F0F0" }}>
          <input type="checkbox" checked={t.done} onChange={() => onToggle(t)} style={{ width:14, height:14, cursor:"pointer", marginTop:3, flexShrink:0 }} />
          <div style={{ flex:1, minWidth:0 }}>
            {editing ? (
              <input ref={inputRef} value={editText} onChange={e => setEditText(e.target.value)}
                onKeyDown={e => { if(e.key==="Enter") saveText(); if(e.key==="Escape"){setEditText(t.text);setEditing(false);} }}
                onBlur={saveText}
                style={{ width:"100%", fontSize:12, padding:"2px 6px", border:"1px solid #2196F3", borderRadius:5, outline:"none", boxSizing:"border-box" }} />
            ) : (
              <div onClick={() => { setEditText(t.text); setEditing(true); }} title="클릭하여 수정"
                style={{ fontSize:12, color:t.done?"#9E9E9E":"#212121", textDecoration:t.done?"line-through":"none", cursor:"text", lineHeight:1.5 }}>
                {t.text}
              </div>
            )}
            <div style={{ display:"flex", gap:4, marginTop:2, flexWrap:"wrap" }}>
              {cat && <span style={{ fontSize:9, color:catColor, fontWeight:700 }}>{cat.name}</span>}
              <span style={{ fontSize:9, color:mc.badge, fontWeight:700 }}>· {t.member}</span>
            </div>
          </div>
          <div style={{ position:"relative", flexShrink:0 }} ref={menuRef}>
            <button onClick={() => setShowMenu(s => !s)}
              style={{ padding:"1px 6px", background:"transparent", border:"none", color:"#CFD8DC", cursor:"pointer", fontSize:16, lineHeight:1 }}>⋯</button>
            {showMenu && (
              <div style={{ position:"absolute", right:0, top:"calc(100% + 4px)", zIndex:100, background:"#fff", borderRadius:12, boxShadow:"0 6px 24px rgba(0,0,0,.15)", minWidth:210, padding:"6px 0", border:"1px solid #F0F0F0" }}>
                <button onClick={() => { setEditText(t.text); setEditing(true); setShowMenu(false); }} style={MI}>✏️&nbsp; 업무명 수정</button>
                <div style={DIV} />
                <div style={ML}>담당자 변경</div>
                {memberNames.map((m, idx) => (
                  <button key={m} onClick={() => { onUpdate(t.id, {...t, member:m}); setShowMenu(false); }}
                    style={{ ...MI, color:t.member===m?(idx===0?"#1565C0":"#880E4F"):"#37474F", fontWeight:t.member===m?700:400 }}>
                    <span style={{ width:8, height:8, borderRadius:99, background:idx===0?"#2196F3":"#E91E63", display:"inline-block", marginRight:8 }} />
                    {m}{t.member===m?" ✓":""}
                  </button>
                ))}
                <div style={DIV} />
                <div style={ML}>요일 변경</div>
                {[...DAYS.map((d,i)=>({label:`${d}요일 (${fmt(weekDates[i])})`,value:i})),{label:"미배정",value:null}].map(({label,value})=>(
                  <button key={String(value)} onClick={() => { onUpdate(t.id, {...t, dayIndex:value}); setShowMenu(false); }}
                    style={{ ...MI, color:t.dayIndex===value?"#1565C0":"#37474F", fontWeight:t.dayIndex===value?700:400 }}>
                    <span style={{ width:12, display:"inline-block", marginRight:4, color:"#2196F3", fontSize:10 }}>{t.dayIndex===value?"✓":""}</span>
                    {label}
                  </button>
                ))}
                <div style={DIV} />
                <button onClick={() => { onDelete(t.id); setShowMenu(false); }} style={{ ...MI, color:"#EF5350" }}>🗑&nbsp; 삭제</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    const MI = { display:"flex", alignItems:"center", width:"100%", padding:"8px 16px", border:"none", background:"transparent", cursor:"pointer", fontSize:12, textAlign:"left" };
    const ML = { padding:"5px 16px 3px", fontSize:10, color:"#90A4AE", fontWeight:700 };
    const DIV = { height:1, background:"#F5F5F5", margin:"4px 0" };

    /* ── App ── */
    function App() {
      const { data, setData, connected, syncing } = useFirebase();
      const [weekOffset, setWeekOffset] = useState(0);
      const [view, setView] = useState("week");
      const [aiTheme, setAiTheme] = useState("");
      const [aiLoading, setAiLoading] = useState(false);
      const [aiError, setAiError] = useState("");
      const [expandedCat, setExpandedCat] = useState(null);
      const [addTaskCat, setAddTaskCat] = useState(null);
      const [newTaskText, setNewTaskText] = useState("");
      const [newTaskMember, setNewTaskMember] = useState(MEMBERS[0]);
      const [newTaskDay, setNewTaskDay] = useState(null);
      const [exportMsg, setExportMsg] = useState("");
      const [showCatAdd, setShowCatAdd] = useState(false);
      const [newCatName, setNewCatName] = useState("");
      const [editingMembers, setEditingMembers] = useState(false);
      const [tempNames, setTempNames] = useState([...MEMBERS]);
      const [dayAddIndex, setDayAddIndex] = useState(null);
      const [dayAddText, setDayAddText] = useState("");
      const [dayAddMember, setDayAddMember] = useState(MEMBERS[0]);
      const [dayAddCat, setDayAddCat] = useState("");

      const weekDates = getWeekDates(weekOffset);
      const weekKey = fmtFull(weekDates[0]);
      const memberNames = data.memberNames || [...MEMBERS];

      const cats = data.categories.filter(c => c.weekKey === weekKey);
      const tasks = data.tasks.filter(t => t.weekKey === weekKey);

      /* DB 헬퍼 */
      const patchData = (patch) => setData({ ...data, ...patch });

      const handleAiGenerate = async () => {
        if (!aiTheme.trim()) return;
        setAiLoading(true); setAiError("");
        try {
          const result = await aiGenerateTasks(aiTheme, weekDates, memberNames);
          const catId = uid();
          const newCat = { id:catId, weekKey, name:result.categoryName };
          const newTasks = result.tasks.map(t => ({ id:uid(), weekKey, categoryId:catId, text:t.text, member:memberNames.includes(t.member)?t.member:memberNames[0], dayIndex:t.dayIndex??null, done:false, note:t.note||"" }));
          await setData({ ...data, categories:[...data.categories,newCat], tasks:[...data.tasks,...newTasks] });
          setAiTheme(""); setExpandedCat(catId);
        } catch(e) { setAiError("생성 실패: "+e.message); }
        setAiLoading(false);
      };

      const addCategory = async () => {
        if (!newCatName.trim()) return;
        const catId = uid();
        await setData({ ...data, categories:[...data.categories,{id:catId,weekKey,name:newCatName.trim()}] });
        setNewCatName(""); setShowCatAdd(false); setExpandedCat(catId);
      };

      const addManualTask = async (catId) => {
        if (!newTaskText.trim()) return;
        await setData({ ...data, tasks:[...data.tasks,{id:uid(),weekKey,categoryId:catId,text:newTaskText.trim(),member:newTaskMember,dayIndex:newTaskDay,done:false,note:""}] });
        setNewTaskText(""); setNewTaskMember(memberNames[0]); setNewTaskDay(null);
      };

      const addDayTask = async (di) => {
        if (!dayAddText.trim()) return;
        await setData({ ...data, tasks:[...data.tasks,{id:uid(),weekKey,categoryId:dayAddCat||null,text:dayAddText.trim(),member:dayAddMember,dayIndex:di,done:false,note:""}] });
        setDayAddText(""); setDayAddMember(memberNames[0]); setDayAddCat(""); setDayAddIndex(null);
      };

      const toggleTask = async (t) => await setData({ ...data, tasks:data.tasks.map(x=>x.id===t.id?{...x,done:!x.done}:x) });
      const deleteTask = async (id) => await setData({ ...data, tasks:data.tasks.filter(t=>t.id!==id) });
      const updateTask = async (id, patch) => await setData({ ...data, tasks:data.tasks.map(t=>t.id===id?patch:t) });
      const deleteCat = async (id) => await setData({ ...data, categories:data.categories.filter(c=>c.id!==id), tasks:data.tasks.filter(t=>t.categoryId!==id) });
      const saveMemberNames = async () => { await setData({ ...data, memberNames:[...tempNames] }); setEditingMembers(false); };
      const handleExport = async () => { await generateExcel(weekDates,data.categories,data.tasks,memberNames); setExportMsg("✓ 다운로드 완료!"); setTimeout(()=>setExportMsg(""),3000); };

      const totalDone = tasks.filter(t=>t.done).length;
      const totalAll = tasks.length;
      const pct = totalAll ? Math.round(totalDone/totalAll*100) : 0;
      const quickThemes = ["MICC 행사 준비","전문가과정 주차 운영","CEO과정 강의 준비","진흥인의 날 행사","SNS 콘텐츠 제작","외부교육 커리큘럼","총동문회 운영","박람회 준비"];

      return (
        <div style={{ minHeight:"100vh", background:"#EEF2F7" }}>

          {/* 헤더 */}
          <div style={{ background:"linear-gradient(135deg,#1a1a2e,#0f3460)", color:"#fff" }}>
            <div style={{ maxWidth:1020, margin:"0 auto", padding:"22px 20px 0" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:12 }}>
                <div>
                  <div style={{ fontSize:10, letterSpacing:4, color:"#90CAF9", fontWeight:700 }}>맥세스컨설팅 교육팀</div>
                  <h1 style={{ margin:"4px 0 0", fontSize:22, fontWeight:900 }}>📋 주간 업무 플래너</h1>
                </div>
                <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:8 }}>
                  <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                    {/* 연결 상태 */}
                    <span style={{ fontSize:11, color:connected?"#A5D6A7":"#EF9A9A", display:"flex", alignItems:"center", gap:4 }}>
                      <span style={{ width:7, height:7, borderRadius:99, background:connected?"#66BB6A":"#EF5350", display:"inline-block" }} />
                      {connected ? "실시간 연결" : "오프라인"}
                    </span>
                    {syncing && <span style={{ fontSize:11, color:"#90CAF9" }}><span className="spin">↻</span> 저장 중</span>}
                  </div>
                  <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                    <button onClick={() => setWeekOffset(w=>w-1)} style={hB}>←</button>
                    <span style={{ fontSize:13, fontWeight:700, color:"#E3F2FD", minWidth:130, textAlign:"center" }}>{fmt(weekDates[0])} ~ {fmt(weekDates[5])}</span>
                    <button onClick={() => setWeekOffset(w=>w+1)} style={hB}>→</button>
                    <button onClick={() => setWeekOffset(0)} style={{ ...hB, background:"#2196F3", border:"none" }}>이번주</button>
                  </div>
                  <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                    {exportMsg && <span style={{ fontSize:11, color:"#A5D6A7" }}>{exportMsg}</span>}
                    <button onClick={() => { setTempNames([...memberNames]); setEditingMembers(true); }} style={{ ...hB, fontSize:11 }}>👤 팀원 설정</button>
                    <button onClick={handleExport} style={{ padding:"7px 14px", background:"#4CAF50", color:"#fff", border:"none", borderRadius:8, fontSize:12, fontWeight:700, cursor:"pointer" }}>📥 Excel 보고서</button>
                  </div>
                </div>
              </div>

              {/* 팀원 설정 모달 */}
              {editingMembers && (
                <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.5)", zIndex:999, display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <div style={{ background:"#fff", borderRadius:14, padding:24, width:340, boxShadow:"0 8px 32px rgba(0,0,0,.2)" }}>
                    <h3 style={{ margin:"0 0 16px", fontSize:16, color:"#1a1a2e" }}>👤 팀원 이름 설정</h3>
                    {tempNames.map((n,i) => (
                      <div key={i} style={{ marginBottom:10 }}>
                        <div style={{ fontSize:12, color:"#90A4AE", marginBottom:4 }}>팀원 {i+1}</div>
                        <input value={n} onChange={e=>{ const a=[...tempNames]; a[i]=e.target.value; setTempNames(a); }} style={{ ...iSt, width:"100%", boxSizing:"border-box" }} />
                      </div>
                    ))}
                    <div style={{ display:"flex", gap:8, marginTop:16 }}>
                      <button onClick={saveMemberNames} style={{ ...aBt, flex:1 }}>저장</button>
                      <button onClick={()=>setEditingMembers(false)} style={{ ...aBt, flex:1, background:"#9E9E9E" }}>취소</button>
                    </div>
                  </div>
                </div>
              )}

              {/* 진행률 */}
              <div style={{ marginTop:18 }}>
                <div style={{ display:"flex", justifyContent:"space-between", fontSize:11, color:"#90CAF9", marginBottom:5 }}>
                  <span>이번 주 전체 진행률</span>
                  <span style={{ color:"#fff", fontWeight:700 }}>{totalDone}/{totalAll} 완료 ({pct}%)</span>
                </div>
                <div style={{ background:"rgba(255,255,255,.15)", borderRadius:99, height:7, overflow:"hidden" }}>
                  <div style={{ width:`${pct}%`, background:"linear-gradient(90deg,#42A5F5,#66BB6A)", height:"100%", borderRadius:99, transition:"width .5s" }} />
                </div>
              </div>

              {/* 팀원 요약 */}
              <div style={{ display:"flex", gap:12, marginTop:14, paddingBottom:16 }}>
                {memberNames.map((m,mi) => {
                  const mT=tasks.filter(t=>t.member===m); const mD=mT.filter(t=>t.done).length;
                  return (
                    <div key={m} style={{ flex:1, background:"rgba(255,255,255,.1)", borderRadius:10, padding:"10px 14px" }}>
                      <div style={{ fontSize:11, color:"#90CAF9", marginBottom:4 }}>👤 {m}</div>
                      <div style={{ display:"flex", gap:12, alignItems:"center" }}>
                        <span style={{ fontSize:20, fontWeight:900, color:"#fff" }}>{mD}<span style={{ fontSize:12, color:"#90CAF9" }}>/{mT.length}</span></span>
                        <div style={{ flex:1 }}>
                          <div style={{ background:"rgba(255,255,255,.2)", borderRadius:99, height:5, overflow:"hidden" }}>
                            <div style={{ width:mT.length?`${Math.round(mD/mT.length*100)}%`:"0%", background:mi===0?"#42A5F5":"#F48FB1", height:"100%", borderRadius:99 }} />
                          </div>
                          <div style={{ fontSize:10, color:"#90CAF9", marginTop:2 }}>{mT.length?Math.round(mD/mT.length*100):0}% 완료</div>
                        </div>
                      </div>
                    </div>

                })}
              </div>

              {/* 탭 */}
              <div style={{ display:"flex" }}>
                {[["week","📅 주간 계획"],["report","📊 보고서"]].map(([v,l]) => (
                  <button key={v} onClick={()=>setView(v)} style={{ padding:"10px 22px", border:"none", cursor:"pointer", fontSize:13, fontWeight:700, background:view===v?"#fff":"transparent", color:view===v?"#1a1a2e":"#90CAF9", borderRadius:"8px 8px 0 0" }}>{l}</button>
                ))}
              </div>
            </div>
          </div>

          <div style={{ maxWidth:1020, margin:"0 auto", padding:"20px" }}>

            {/* AI */}
            <div style={{ ...crd, background:"linear-gradient(135deg,#1a1a2e,#16213e)", color:"#fff", marginBottom:16 }}>
              <div style={{ fontSize:13, fontWeight:800, color:"#90CAF9", marginBottom:6 }}>✨ AI 업무 자동 생성</div>
              <div style={{ fontSize:12, color:"#B0BEC5", marginBottom:10 }}>맥세스 교육팀 패턴 기반으로 세부 업무를 자동 생성합니다</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:10 }}>
                {quickThemes.map(t => <button key={t} onClick={()=>setAiTheme(t)} style={{ padding:"4px 10px", background:"rgba(255,255,255,.12)", color:"#E3F2FD", border:"1px solid rgba(255,255,255,.2)", borderRadius:99, fontSize:11, cursor:"pointer" }}>{t}</button>)}
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <input value={aiTheme} onChange={e=>setAiTheme(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleAiGenerate()} placeholder="주제 직접 입력 또는 위 버튼 선택..." style={{ flex:1, padding:"10px 14px", borderRadius:8, border:"none", fontSize:13, background:"rgba(255,255,255,.12)", color:"#fff", outline:"none" }} />
                <button onClick={handleAiGenerate} disabled={aiLoading} style={{ padding:"10px 20px", background:aiLoading?"#546E7A":"#2196F3", color:"#fff", border:"none", borderRadius:8, fontSize:13, fontWeight:700, cursor:aiLoading?"not-allowed":"pointer", minWidth:90 }}>{aiLoading?"생성 중…":"AI 생성"}</button>
              </div>
              {aiError && <div style={{ fontSize:12, color:"#EF9A9A", marginTop:8 }}>{aiError}</div>}
            </div>

            {/* ── WEEK VIEW ── */}
            {view==="week" && (
              <>
                {/* 카테고리 */}
                <div style={{ marginBottom:16 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                    <h2 style={{ margin:0, fontSize:15, fontWeight:800, color:"#1a1a2e" }}>🏷 업무 카테고리</h2>
                    <button onClick={()=>setShowCatAdd(s=>!s)} style={aBt}>+ 직접 추가</button>
                  </div>
                  {showCatAdd && (
                    <div style={{ display:"flex", gap:8, marginBottom:10 }}>
                      <input value={newCatName} onChange={e=>setNewCatName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCategory()} placeholder="카테고리명 입력..." style={{ ...iSt, flex:1 }} autoFocus />
                      <button onClick={addCategory} style={aBt}>추가</button>
                    </div>
                  )}
                  {cats.length===0 && <div style={{ ...crd, textAlign:"center", color:"#B0BEC5", padding:32, fontSize:13 }}>AI 생성 또는 직접 카테고리를 추가하세요</div>}
                  {cats.map((cat,ci) => {
                    const catColor=PAL[ci%PAL.length]; const catTasks=tasks.filter(t=>t.categoryId===cat.id); const catDone=catTasks.filter(t=>t.done).length; const isOpen=expandedCat===cat.id;
                    return (
                      <div key={cat.id} style={{ ...crd, marginBottom:10, borderLeft:`5px solid ${catColor}`, padding:0, overflow:"hidden" }}>
                        <div onClick={()=>setExpandedCat(isOpen?null:cat.id)} style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 16px", cursor:"pointer", background:isOpen?`${catColor}10`:"#fff" }}>
                          <span style={{ fontSize:16 }}>🏷</span>
                          <span style={{ fontWeight:800, fontSize:14, color:catColor, flex:1 }}>{cat.name}</span>
                          <span style={{ fontSize:12, color:"#90A4AE" }}>{catDone}/{catTasks.length} 완료</span>
                          <div style={{ background:"#E0E0E0", borderRadius:99, height:6, width:70, overflow:"hidden" }}><div style={{ width:catTasks.length?`${Math.round(catDone/catTasks.length*100)}%`:"0%", background:catColor, height:"100%", borderRadius:99 }} /></div>
                          <button onClick={e=>{e.stopPropagation();deleteCat(cat.id);}} style={{ padding:"2px 6px", background:"transparent", border:"none", color:"#CFD8DC", cursor:"pointer", fontSize:14 }}>🗑</button>
                          <span style={{ fontSize:11, color:"#90A4AE" }}>{isOpen?"▲":"▼"}</span>
                        </div>
                        {isOpen && (
                          <div style={{ padding:"0 16px 14px", background:`${catColor}06` }}>
                            {catTasks.length===0 && <div style={{ fontSize:13, color:"#CFD8DC", padding:"10px 0" }}>세부 업무가 없습니다</div>}
                            {catTasks.map(t => <TaskRow key={t.id} t={t} cats={cats} memberNames={memberNames} weekDates={weekDates} onToggle={toggleTask} onDelete={deleteTask} onUpdate={updateTask} />)}
                            {addTaskCat===cat.id ? (
                              <div style={{ display:"flex", gap:8, marginTop:10, flexWrap:"wrap" }}>
                                <select value={newTaskMember} onChange={e=>setNewTaskMember(e.target.value)} style={sSt}>{memberNames.map(m=><option key={m}>{m}</option>)}</select>
                                <select value={newTaskDay??""} onChange={e=>setNewTaskDay(e.target.value===""?null:Number(e.target.value))} style={sSt}><option value="">요일 선택</option>{DAYS.map((d,i)=><option key={i} value={i}>{d}요일</option>)}</select>
                                <input value={newTaskText} onChange={e=>setNewTaskText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&(addManualTask(cat.id),setAddTaskCat(null))} placeholder="세부 업무 입력..." style={{ ...iSt, flex:1 }} autoFocus />
                                <button onClick={()=>{addManualTask(cat.id);setAddTaskCat(null);}} style={aBt}>추가</button>
                                <button onClick={()=>setAddTaskCat(null)} style={{ ...aBt, background:"#9E9E9E" }}>취소</button>
                              </div>
                            ) : (
                              <button onClick={()=>{setAddTaskCat(cat.id);setNewTaskText("");}} style={{ marginTop:10, padding:"7px 14px", background:"transparent", border:`1px dashed ${catColor}`, color:catColor, borderRadius:8, fontSize:12, fontWeight:700, cursor:"pointer" }}>+ 세부 업무 추가</button>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                {/* 요일 카드 */}
                <h2 style={{ fontSize:15, fontWeight:800, color:"#1a1a2e", margin:"0 0 4px" }}>📅 요일별 현황</h2>
                <p style={{ fontSize:11, color:"#90A4AE", margin:"0 0 10px" }}>업무명 클릭 → 텍스트 수정 &nbsp;|&nbsp; ⋯ 버튼 → 담당자·요일 변경·삭제</p>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10 }}>
                  {DAYS.map((day,di) => {
                    const isToday=fmtFull(weekDates[di])===todayStr&&weekOffset===0; const dayTasks=tasks.filter(t=>t.dayIndex===di); const dayDone=dayTasks.filter(t=>t.done).length; const isAddingHere=dayAddIndex===di;
                    return (
                      <div key={day} style={{ ...crd, padding:12, border:isToday?"2px solid #2196F3":"1px solid #E8EDF2", background:isToday?"#EBF5FF":"#fff" }}>
                        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                          <div style={{ display:"flex", gap:5, alignItems:"center" }}>
                            <span style={{ fontWeight:800, fontSize:14, color:isToday?"#1565C0":"#1a1a2e" }}>{day}요일</span>
                            {isToday&&<span style={{ fontSize:9, background:"#2196F3", color:"#fff", padding:"1px 5px", borderRadius:99, fontWeight:700 }}>TODAY</span>}
                          </div>
                          <span style={{ fontSize:11, color:"#90A4AE" }}>{fmt(weekDates[di])}</span>
                        </div>
                        {dayTasks.length>0&&(
                          <div style={{ marginBottom:8 }}>
                            <div style={{ background:"#E0E0E0", borderRadius:99, height:4 }}><div style={{ width:`${Math.round(dayDone/dayTasks.length*100)}%`, background:"#66BB6A", height:"100%", borderRadius:99 }} /></div>
                            <div style={{ fontSize:10, color:"#90A4AE", textAlign:"right", marginTop:2 }}>{dayDone}/{dayTasks.length}</div>
                          </div>
                        )}
                        {dayTasks.length===0&&!isAddingHere&&<div style={{ fontSize:12, color:"#CFD8DC", fontStyle:"italic", marginBottom:8 }}>업무 없음</div>}
                        {dayTasks.map(t => <TaskRow key={t.id} t={t} cats={cats} memberNames={memberNames} weekDates={weekDates} onToggle={toggleTask} onDelete={deleteTask} onUpdate={updateTask} />)}
                        {isAddingHere ? (
                          <div style={{ marginTop:8, background:"#F8F9FA", borderRadius:8, padding:10 }}>
                            <div style={{ display:"flex", gap:6, marginBottom:6 }}>
                              <select value={dayAddMember} onChange={e=>setDayAddMember(e.target.value)} style={{ ...sSt, flex:1, fontSize:11, padding:"5px 8px" }}>{memberNames.map(m=><option key={m}>{m}</option>)}</select>
                              <select value={dayAddCat} onChange={e=>setDayAddCat(e.target.value)} style={{ ...sSt, flex:1, fontSize:11, padding:"5px 8px" }}>
                                <option value="">카테고리 없음</option>
                                {cats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                              </select>
                            </div>
                            <input value={dayAddText} onChange={e=>setDayAddText(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")addDayTask(di);if(e.key==="Escape")setDayAddIndex(null);}} placeholder="업무 내용 입력 후 Enter..." style={{ ...iSt, width:"100%", boxSizing:"border-box", fontSize:12, marginBottom:6 }} autoFocus />
                            <div style={{ display:"flex", gap:6 }}>
                              <button onClick={()=>addDayTask(di)} style={{ ...aBt, flex:1, fontSize:11, padding:"6px" }}>추가</button>
                              <button onClick={()=>setDayAddIndex(null)} style={{ ...aBt, flex:1, fontSize:11, padding:"6px", background:"#9E9E9E" }}>취소</button>
                            </div>
                          </div>
                        ) : (
                          <button onClick={()=>{setDayAddIndex(di);setDayAddText("");setDayAddMember(memberNames[0]);setDayAddCat("");}} style={{ marginTop:8, width:"100%", padding:"6px", background:"transparent", border:"1px dashed #CFD8DC", borderRadius:6, fontSize:11, color:"#90A4AE", cursor:"pointer" }}>+ 업무 추가</button>
                        )}
                      </div>
                    );
                  })}
                </div>
              </>
            )}

            {/* ── REPORT VIEW ── */}
            {view==="report" && (
              <div>

                  <span style={{ fontSize:12, color:"#90A4AE" }}>맥세스컨설팅 교육팀 | {fmt(weekDates[0])} ~ {fmt(weekDates[5])}</span>
                </div>
                {cats.length===0&&<div style={{ ...crd, textAlign:"center", color:"#B0BEC5", padding:40 }}>업무 카테고리가 없습니다</div>}

                  const catColor=PAL[ci%PAL.length]; const catTasks=tasks.filter(t=>t.categoryId===cat.id); const catDone=catTasks.filter(t=>t.done).length;

                    <div key={cat.id} style={{ ...crd, marginBottom:14, borderLeft:`6px solid ${catColor}`, padding:0, overflow:"hidden" }}>

                        <span style={{ fontWeight:800, color:catColor }}>{catTasks.length?Math.round(catDone/catTasks.length*100):0}%</span>
                      </div>
                      <div style={{ padding:"14px 18px" }}>
                        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:14 }}>
                          {memberNames.map((m,mi) => {
                            const mc=mi===0?MC["김수지"]:MC["팀원"]; const mTasks=catTasks.filter(t=>t.member===m);
                            return (
                              <div key={m} style={{ background:mc.bg, borderRadius:10, padding:12, border:`1px solid ${mc.border}` }}>
                                <div style={{ fontSize:12, fontWeight:800, color:mc.text, marginBottom:8 }}>👤 {m}</div>
                                {mTasks.length===0&&<div style={{ fontSize:12, color:"#CFD8DC" }}>해당 없음</div>}
                                {mTasks.map(t=>(
                                  <div key={t.id} style={{ display:"flex", gap:6, alignItems:"center", marginBottom:5 }}>
                                    <span style={{ fontSize:13, color:t.done?"#9E9E9E":"#37474F", textDecoration:t.done?"line-through":"none", flex:1 }}>{t.text}</span>
                                    {t.dayIndex!==null&&<span style={{ fontSize:10, color:"#90A4AE" }}>{DAYS[t.dayIndex]}</span>}
                                    <span style={{ fontSize:11, fontWeight:700, color:t.done?"#66BB6A":"#FFA726" }}>{t.done?"✓":"○"}</span>
                                  </div>
                                ))}
                              </div>
                            );
                          })}
                        </div>
                        <div style={{ borderTop:"1px solid #F0F0F0", paddingTop:10 }}>
                          <div style={{ fontSize:11, fontWeight:700, color:"#78909C", marginBottom:8 }}>📅 요일별 배분</div>
                          <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                            {byDay.map(({day,date,tasks:dt})=>(
                              <div key={day} style={{ minWidth:88, background:dt.length?`${catColor}10`:"#FAFAFA", border:`1px solid ${dt.length?catColor+"50":"#E0E0E0"}`, borderRadius:8, padding:"6px 8px" }}>
                                <div style={{ fontSize:10, fontWeight:700, color:catColor, marginBottom:3 }}>{day} ({fmt(date)})</div>
                                {dt.length===0&&<div style={{ fontSize:10, color:"#CFD8DC" }}>-</div>}
                                {dt.map(t=><div key={t.id} style={{ fontSize:11, color:t.done?"#9E9E9E":"#37474F", textDecoration:t.done?"line-through":"none" }}>{t.text.length>13?t.text.slice(0,13)+"…":t.text}</div>)}
                              </div>
                            ))}
                            {unassigned.length>0&&(
                              <div style={{ minWidth:88, background:"#FFF8E1", border:"1px solid #FFE082", borderRadius:8, padding:"6px 8px" }}>
                                <div style={{ fontSize:10, fontWeight:700, color:"#F9A825", marginBottom:3 }}>미배정</div>
                                {unassigned.map(t=><div key={t.id} style={{ fontSize:11, color:"#78909C" }}>{t.text.length>13?t.text.slice(0,13)+"…":t.text}</div>)}
                              </div>
                            )}
                          </div>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            <div style={{ textAlign:"center", fontSize:11, color:"#B0BEC5", marginTop:10 }}>
              💾 Firebase 실시간 저장 · 업무명 클릭 또는 ⋯ 버튼으로 수정 · 📥 Excel 보고서 다운로드
            </div>
          </div>
        </div>
      );
    }

    const crd = { background:"#fff", borderRadius:14, padding:18, boxShadow:"0 2px 8px rgba(0,0,0,.06)" };
    const hB  = { padding:"6px 12px", background:"rgba(255,255,255,.15)", color:"#fff", border:"1px solid rgba(255,255,255,.3)", borderRadius:8, cursor:"pointer", fontSize:14 };
    const iSt = { padding:"8px 12px", border:"1px solid #E0E0E0", borderRadius:8, fontSize:13, outline:"none", color:"#212121" };
    const sSt = { padding:"7px 10px", border:"1px solid #E0E0E0", borderRadius:8, fontSize:12, background:"#fff", color:"#37474F", cursor:"pointer" };
    const aBt = { padding:"8px 16px", background:"#1a1a2e", color:"#fff", border:"none", borderRadius:8, fontSize:13, fontWeight:700, cursor:"pointer" };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
